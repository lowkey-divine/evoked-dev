  <circle class="star" cx="155" cy="160" r="1.3" opacity="0.65"/>
  <circle class="star" cx="245" cy="160" r="1.3" opacity="0.65"/>
  <circle class="star" cx="180" cy="170" r="1.1" opacity="0.55"/>
  <circle class="star" cx="220" cy="170" r="1.1" opacity="0.55"/>
  <circle class="star" cx="125" cy="265" r="1.4" opacity="0.6"/>
  <circle class="star" cx="275" cy="265" r="1.4" opacity="0.6"/>
  <circle class="star" cx="165" cy="270" r="1.2" opacity="0.55"/>
  <circle class="star" cx="235" cy="270" r="1.2" opacity="0.55"/>

  <text class="latin" x="200" y="378" text-anchor="middle" letter-spacing="0.06em">per stellae magnitudinem</text>

  <text class="caption-main" x="200" y="420" text-anchor="middle">FIG · ORION</text>
  <text class="caption-cite" x="200" y="438" text-anchor="middle">After Bayer · Uranometria</text>
  <text class="caption-cite" x="200" y="452" text-anchor="middle">Augsburg · 1603</text>
