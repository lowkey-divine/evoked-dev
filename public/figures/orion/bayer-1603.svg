    <path d="M 185 110 Q 175 140 175 175 Q 178 205 188 235"/>
    <path d="M 215 110 Q 225 140 225 175 Q 222 205 212 235"/>
    <path d="M 175 198 Q 200 203 225 198" opacity="0.5"/>
