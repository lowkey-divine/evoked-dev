<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 460" role="img" aria-label="Orion, after Bayer's Uranometria, Augsburg, 1603">
  <title>Orion - after Bayer - Uranometria - Augsburg - 1603</title>
  <desc>Star-position plate in the Bayer tradition. Greek-letter designations per stellae magnitudinem. Hunter as faint ghost outline. Brass-line, Evoked brand palette.</desc>
  <defs>
    <style>
      .frame { stroke: #A88838; stroke-width: 0.3; stroke-dasharray: 1 2; opacity: 0.32; fill: none; }
      .crosshair { stroke: #A88838; stroke-width: 0.15; opacity: 0.18; }
      .grid { stroke: #A88838; stroke-width: 0.2; opacity: 0.22; }
      .ghost { stroke: #7E6622; stroke-width: 0.5; fill: none; opacity: 0.32; stroke-linecap: round; stroke-linejoin: round; }
      .star { fill: #A88838; }
      .greek { font-family: 'EB Garamond', Georgia, serif; font-size: 12px; fill: #7E6622; font-style: italic; }
      .caption-main { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 9px; fill: #A88838; letter-spacing: 0.28em; text-transform: uppercase; font-weight: 500; }
      .caption-cite { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 9px; fill: #7E6622; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 500; }
      .latin { font-family: 'EB Garamond', Georgia, serif; font-size: 10px; fill: #7E6622; font-style: italic; opacity: 0.85; }
    </style>
    <radialGradient id="sketch-fade" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="48%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="sketch-fade-mask">
      <rect width="400" height="400" fill="url(#sketch-fade)"/>
    </mask>
  </defs>

  <rect class="frame" x="20" y="20" width="360" height="360"/>
  <line class="crosshair" x1="200" y1="20" x2="200" y2="380"/>
  <line class="crosshair" x1="20" y1="200" x2="380" y2="200"/>
  <g>
    <line class="grid" x1="125" y1="40" x2="125" y2="360" stroke-dasharray="2 3"/>
    <line class="grid" x1="275" y1="40" x2="275" y2="360" stroke-dasharray="2 3"/>
    <line class="grid" x1="40" y1="125" x2="360" y2="125" stroke-dasharray="2 3"/>
    <line class="grid" x1="40" y1="275" x2="360" y2="275" stroke-dasharray="2 3"/>
  </g>

  <g class="ghost" mask="url(#sketch-fade-mask)">
