name: Auto-publish - Both Are Progressing (2026-06-18 07:00 CDT)

# Publishes src/content/writing/both-are-progressing.md by flipping
# draft: true -> draft: false and pushing to main, which triggers
# Vercel auto-deploy.
#
# Schedule: 12:00 UTC on 2026-06-18 = 7:00 AM CDT
# Note: GitHub free-tier scheduled workflows may delay 5-15 minutes
# under platform load. The publish may land between 7:00 and 7:15 AM CDT.
#
# Manual fallback: trigger via "Actions" tab > this workflow > Run workflow.

on:
  schedule:
    - cron: '0 12 18 6 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate target date (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          CURRENT_DATE=$(date -u +%Y-%m-%d)
          if [ "$CURRENT_DATE" != "2026-06-18" ]; then
            echo "Scheduled run on $CURRENT_DATE, not target 2026-06-18. Exiting cleanly."
            exit 0
          fi
          echo "On target date 2026-06-18. Proceeding."

      - name: Check if article already published
        id: check
        run: |
          if grep -q "^draft: false$" src/content/writing/both-are-progressing.md; then
            echo "Article already at draft:false. Nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Article at draft:true. Will publish."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Flip draft to false
        if: steps.check.outputs.skip != 'true'
        run: |
          sed -i 's/^draft: true$/draft: false/' src/content/writing/both-are-progressing.md
          echo "After sed:"
          grep "^draft:" src/content/writing/both-are-progressing.md

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/writing/both-are-progressing.md
          git commit -m "Auto-publish: Both Are Progressing. Both Failed the Same Three Items."
          git push
